name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile rag_backend.py rag_chatbot.py app.py

      - name: Verify Gradio app import
        run: |
          python - <<'PY'
          import app

          status = app.format_status()
          assert "Status" in status
          print(status)
          PY

  large-files:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for files over the Spaces limit
        run: |
          oversized_files="$(find . -type f -not -path './.git/*' -size +10M -print)"

          if [ -n "$oversized_files" ]; then
            echo "The following files exceed Hugging Face Spaces' 10 MB git limit:"
            echo "$oversized_files"
            echo "Track large files with Git LFS before merging."
            exit 1
          fi
