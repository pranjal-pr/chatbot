name: Deploy to Hugging Face Space

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Enable Git LFS
        run: git lfs install

      - name: Validate deployment settings
        env:
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_SPACE_REPO" ]; then
            echo "Missing GitHub Actions variable HF_SPACE_REPO. Expected format: username/space-name."
            exit 1
          fi

          if [ -z "$HF_TOKEN" ]; then
            echo "Missing GitHub Actions secret HF_TOKEN."
            exit 1
          fi

          if [[ "$HF_SPACE_REPO" != */* ]]; then
            echo "HF_SPACE_REPO must be in the format username/space-name."
            exit 1
          fi

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push main to Hugging Face Space
        env:
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          HF_USERNAME="${HF_SPACE_REPO%%/*}"
          git push "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" HEAD:main --force
