name: Deploy To Hugging Face Space

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy types-requests

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Mypy type check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: mypy api.py chatbot.py rag_utility.py observability.py evaluation tests

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest -q tests

      - name: Validate required secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID_SECRET: ${{ secrets.HF_SPACE_ID }}
          HF_SPACE_ID_VAR: ${{ vars.HF_SPACE_ID }}
          HF_SPACE_REPO_VAR: ${{ vars.HF_SPACE_REPO }}
        run: |
          if [ -z "${HF_TOKEN}" ]; then
            echo "Missing required secret: HF_TOKEN"
            exit 1
          fi

          SPACE_ID="${HF_SPACE_ID_SECRET:-${HF_SPACE_ID_VAR:-${HF_SPACE_REPO_VAR}}}"

          if [ -z "${SPACE_ID}" ]; then
            echo "Missing Hugging Face Space id."
            echo "Set one of: secret HF_SPACE_ID, variable HF_SPACE_ID, or variable HF_SPACE_REPO."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs install

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID_SECRET: ${{ secrets.HF_SPACE_ID }}
          HF_SPACE_ID_VAR: ${{ vars.HF_SPACE_ID }}
          HF_SPACE_REPO_VAR: ${{ vars.HF_SPACE_REPO }}
        run: |
          SPACE_ID="${HF_SPACE_ID_SECRET:-${HF_SPACE_ID_VAR:-${HF_SPACE_REPO_VAR}}}"
          HF_REMOTE="https://hf_user:${HF_TOKEN}@huggingface.co/spaces/${SPACE_ID}"

          git remote remove hf-space 2>/dev/null || true
          git remote add hf-space "${HF_REMOTE}"

          # Force push so Space content always matches this GitHub commit exactly.
          git push hf-space HEAD:main --force
